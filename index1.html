<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssignMEnt 5</title>  
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- font -style -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">   
    <link rel="stylesheet" href="./style.css">    
</head>
<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
    <a class="btn btn-ghost text-xl font-bold"> <img src="./assets/github-logo.png" alt="" class="w-[10%]">Github Issues Tracker</a>
        </div>
        <div class="join">
        <div>
        <label class="input validator join-item">
        <i class="fa-brands fa-sistrix"></i>
      <input id="search-issue" type="text" placeholder="Search issues" />
        </label>
        </div>
         <button id="search-btn" class="btn btn-primary  join-item">Search</button>
        </div>
    </div>
    </header>

    <section class="w-11/12 mx-auto mt-10">
        <button id="all-btn" onclick="allIssues()" class="btn btn-outline btn-primary px-10 tab-btn">All</button>
        <button id="open-btn"onclick="openIssue()" class="btn btn-outline btn-primary px-10 tab-btn">Open</button>
        <button id="close-btn" onclick="closeIssue()" class="btn btn-outline btn-primary px-10 tab-btn">Close</button>
    </section>
    <section class="w-11/12 mx-auto mt-10 flex items-center justify-between">
        <div class="flex gap-3">
            <div class="bg-violet-200 rounded-full p-4">
                <img src="./assets/Aperture.png" alt="" class="">
            </div>
            <div>
                <p class="text-2xl font-semibold "><span  id="issue-count">0</span> Issues</p>
                <p class="text-gray-400 text-2xl">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-5 items-center">
            <div class="flex items-center gap-2">
                <p class="bg-green-500 rounded-full w-5 h-5"></p>
                <p class="text-xl font-bold">Open</p>
            </div>
            <div class="flex items-center gap-2">
                <p class="bg-violet-500 rounded-full w-5 h-5"></p>
                <p class="text-xl font-bold">Closed</p>
            </div>
        </div>
    </section>

    <section id="spinner" class="flex justify-center items-center py-10 hidden">
    <span class="loading loading-bars loading-xl"></span>
  </section>
    <section id="issue-container" class="w-11/12 mx-auto bg-gray-200 mt-10 grid grid-cols-4 gap-4 p-4">
       
    </section>

    <!-- Open the modal using ID.showModal() method -->
<!--  -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
   <div id="modal-container" class="space-y-3">

   </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <!-- <section id="open-container" class="w-11/12 mx-auto bg-gray-200 mt-10 grid grid-cols-4 gap-4 p-4">
        
    </section>
    <section id="closed-containr" class="w-11/12 mx-auto bg-gray-200 mt-10 grid grid-cols-4 gap-4 p-4">

    </section> -->
    <script src="./script/script1.js"></script>
</body>
</html>
